<svg width="48" height="48" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Card -->
  <rect x="5" y="9" width="38" height="30" rx="5" fill="none" stroke="#474747" stroke-width="2.5"/>
  <!-- Row 1: label + switch (on) -->
  <line x1="11" y1="19" x2="20" y2="19" stroke="#474747" stroke-width="2.2" stroke-linecap="round"/>
  <rect x="29" y="15.5" width="11" height="7" rx="3.5" fill="#474747"/>
  <circle cx="36.5" cy="19" r="2.3" fill="#ffffff"/>
  <!-- Row 2: label + switch (off) -->
  <line x1="11" y1="29" x2="20" y2="29" stroke="#474747" stroke-width="2.2" stroke-linecap="round"/>
  <rect x="29" y="25.5" width="11" height="7" rx="3.5" fill="none" stroke="#474747" stroke-width="1.6"/>
  <circle cx="32.5" cy="29" r="2.3" fill="#474747"/>
</svg>
